name: Notify Docs Update

# Este workflow deve ser adicionado aos repositórios que querem notificar a documentação
# Copie este arquivo para .github/workflows/repo-dispatch.yml no repositório desejado

on:
  push:
    branches: [main, master]
    paths:
      - README.md # Só dispara quando o README for alterado
      - MANUAL.md # Só dispara quando o MANUAL for alterado
  workflow_dispatch: # Permite execução manual

env:
  FRIENDLY_NAME: "Nome Amigável Aqui"  # ⚠️ Altere para o nome que aparecerá na sidebar
  DOC_FILE: "MANUAL.md"                # ⚠️ README.md ou MANUAL.md

jobs:
  notify-docs:
    name: Notify Documentation Repo
    runs-on: ubuntu-latest
    steps:
      - name: Disparar atualização na documentação
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: mri-Qbox-Brasil/docs-mriqbox
          event-type: update-manual
          client-payload: '{"org": "mri-Qbox-Brasil", "repo": "${{ github.event.repository.name }}", "name": "${{ env.FRIENDLY_NAME }}", "doc_file": "${{ env.DOC_FILE }}"}'
