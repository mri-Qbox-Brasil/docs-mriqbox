name: Update Documentation

# Este workflow pertence ao repositório de documentação (docs-mriqbox).
# Copie este arquivo para .github/workflows/update-docs.yml no repo da docs.

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Organização do repositório'
        required: true
        default: 'mri-Qbox-Brasil'
      repo:
        description: 'Nome do repositório'
        required: true
      name:
        description: 'Nome amigável para a sidebar'
        required: true
      doc_file:
        description: 'Arquivo de documentação (README.md ou MANUAL.md)'
        required: false
        default: 'MANUAL.md'
  repository_dispatch:
    types: [update-manual]

jobs:
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: Definir variáveis
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ORG=${{ github.event.client_payload.org }}" >> $GITHUB_ENV
            echo "REPO=${{ github.event.client_payload.repo }}" >> $GITHUB_ENV
            echo "NAME=${{ github.event.client_payload.name }}" >> $GITHUB_ENV
            echo "DOC_FILE=${{ github.event.client_payload.doc_file || 'MANUAL.md' }}" >> $GITHUB_ENV
          else
            echo "ORG=${{ inputs.org }}" >> $GITHUB_ENV
            echo "REPO=${{ inputs.repo }}" >> $GITHUB_ENV
            echo "NAME=${{ inputs.name }}" >> $GITHUB_ENV
            echo "DOC_FILE=${{ inputs.doc_file || 'MANUAL.md' }}" >> $GITHUB_ENV
          fi

      - name: Baixar documentação e atualizar sidebar
        run: |
          mkdir -p pages/mri/resources

          echo "Processando ${{ env.NAME }} (${{ env.ORG }}/${{ env.REPO }})..."

          status_code=$(curl -s -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ env.ORG }}/${{ env.REPO }}/contents/${{ env.DOC_FILE }}" \
            -o "pages/mri/resources/${{ env.REPO }}.md")

          if [ "$status_code" -eq 200 ]; then
            echo "✅ ${{ env.DOC_FILE }} de ${{ env.REPO }} baixado com sucesso."

            META="pages/mri/resources/_meta.ts"
            if [ ! -f "$META" ]; then
              printf 'export default {\n  index: { display: "hidden" },\n}\n' > "$META"
            fi

            node -e '
              const fs = require("fs");
              const meta = "pages/mri/resources/_meta.ts";
              const repo = process.env.REPO;
              const name = process.env.NAME;

              const content = fs.readFileSync(meta, "utf8");

              const entries = {};
              const re = /^\s+"?([^":{}\s][^":{}\n]*?)"?\s*:\s+"([^"]+)",?$/gm;
              let m;
              while ((m = re.exec(content)) !== null) {
                entries[m[1].trim()] = m[2];
              }

              entries[repo] = name;

              const sorted = Object.keys(entries).sort((a, b) =>
                a.toLowerCase().localeCompare(b.toLowerCase())
              );

              const lines = sorted.map(k => `  "${k}": "${entries[k]}",`).join("\n");
              const hasIndex = /index:\s*\{/.test(content);
              const indexLine = hasIndex ? "  \"index\": { display: \"hidden\" },\n" : "";

              fs.writeFileSync(meta, `export default {\n${indexLine}${lines}\n}\n`);
              console.log(`_meta.ts atualizado: "${repo}": "${name}"`);
            '
          else
            echo "❌ Erro ao baixar ${{ env.DOC_FILE }} de ${{ env.REPO }} (Status: $status_code)"
            rm -f "pages/mri/resources/${{ env.REPO }}.md"
            exit 1
          fi

      - name: Commit e Push se houver mudanças
        run: |
          git add pages/mri/resources/
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "chore: atualiza documentação de ${{ env.REPO }}"
            git push
          fi
