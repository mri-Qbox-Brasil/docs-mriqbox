name: Update Documentation

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Organização do repositório'
        required: true
        default: 'mri-Qbox-Brasil'
      repo:
        description: 'Nome do repositório'
        required: true
      name:
        description: 'Nome amigável para a sidebar'
        required: true
  repository_dispatch:
    types: [update-manual]

jobs:
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: Definir variáveis
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ORG=${{ github.event.client_payload.org }}" >> $GITHUB_ENV
            echo "REPO=${{ github.event.client_payload.repo }}" >> $GITHUB_ENV
            echo "NAME=${{ github.event.client_payload.name }}" >> $GITHUB_ENV
          else
            echo "ORG=${{ inputs.org }}" >> $GITHUB_ENV
            echo "REPO=${{ inputs.repo }}" >> $GITHUB_ENV
            echo "NAME=${{ inputs.name }}" >> $GITHUB_ENV
          fi

      - name: Baixar MANUAL.md e atualizar sidebar
        run: |
          mkdir -p pages/mri/resources

          echo "Processando ${{ env.NAME }} (${{ env.ORG }}/${{ env.REPO }})..."

          status_code=$(curl -s -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ env.ORG }}/${{ env.REPO }}/contents/MANUAL.md" \
            -o "pages/mri/resources/${{ env.REPO }}.md")

          if [ "$status_code" -eq 200 ]; then
            echo "✅ MANUAL.md de ${{ env.REPO }} baixado com sucesso."
            if [ ! -f pages/mri/resources/_meta.json ]; then
              echo "{}" > pages/mri/resources/_meta.json
            fi
            jq --arg repo "${{ env.REPO }}" --arg name "${{ env.NAME }}" \
              '.[$repo] = $name' pages/mri/resources/_meta.json > tmp.json
            mv tmp.json pages/mri/resources/_meta.json
          else
            echo "❌ Erro ao baixar MANUAL.md de ${{ env.REPO }} (Status: $status_code)"
            rm -f "pages/mri/resources/${{ env.REPO }}.md"
            exit 1
          fi

      - name: Commit e Push se houver mudanças
        run: |
          git add pages/mri/resources/
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "chore: atualiza documentação de ${{ env.REPO }}"
            git push
          fi
